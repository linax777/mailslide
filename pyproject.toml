[project]
name = "outlook-mail-extractor"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "httpx>=0.27.0",
    "loguru>=0.7.0",
    "pycron>=0.2.2",
    "pywin32>=311",
    "pyyaml>=6.0.3",
    "textual>=8.1.1",
    "textual-dev>=1.8.0",
]

[project.scripts]
outlook-extract = "outlook_mail_extractor.__main__:main"

[tool.setuptools.packages.find]
include = ["outlook_mail_extractor*"]
exclude = ["config*", "tasks*", "tests*"]



